services:
  - type: web
    name: sniffing-game-api
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sniffing-game-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://chanyeongyuan.github.io,https://sniffing-game.onrender.com

  - type: web
    name: sniffing-game
    runtime: static
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sniffing-game-db
    databaseName: sniffing_game
    user: sniffing_game_user
    plan: free
    postgresMajorVersion: "15"
